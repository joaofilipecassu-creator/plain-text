<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Atividade JavaScript</title>

    <script>

        var agora = new Date();

        var diasSemana = [
            "Domingo",
            "Segunda-feira",
            "Terça-feira",
            "Quarta-feira",
            "Quinta-feira",
            "Sexta-feira",
            "Sábado"
        ];

        function saudacao() {

            var hora = agora.getHours();

            var dia = diasSemana[agora.getDay()];

            if (hora >= 5 && hora < 12) {

                alert(
                    "João Felipe Cassu\n" +
                    "São Paulo - SP\n" +
                    "Bom dia! Hoje é " + dia
                );

            } else if (hora >= 12 && hora < 18) {

                alert(
                    "João Felipe Cassu\n" +
                    "São Paulo - SP\n" +
                    "Boa tarde! Hoje é " + dia
                );

            } else {

                alert(
                    "João Felipe Cassu\n" +
                    "São Paulo - SP\n" +
                    "Boa noite! Hoje é " + dia
                );
            }
        }

    </script>
</head>

<body onload="saudacao()">

</body>
</html>
